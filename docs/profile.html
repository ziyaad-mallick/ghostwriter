<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghostwriter — Profiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="./index.html" class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">Ghostwriter</span>
            </a>
            <ul class="nav-links">
                <li><a href="./index.html" class="nav-link">Analyze</a></li>
                <li><a href="./profile.html" class="nav-link active">Profiles</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Your Writing Profiles</h1>
            <p>View and manage your saved stylometric fingerprints.</p>
        </div>

        <div class="content-grid">
            <div class="card profile-list-card">
                <h2>Saved Profiles</h2>
                <div id="profile-list-container">
                    <p class="empty-state">No profiles yet. <a href="./index.html">Create one →</a></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Ghostwriter — 100% local, no cloud, no APIs. Pure statistical NLP.</p>
    </footer>

    <script type="module">
        import { listProfiles, loadProfile, deleteProfile } from './js/storage.js';

        function renderProfileList() {
            const profiles = listProfiles();
            const container = document.getElementById('profile-list-container');

            if (!profiles.length) {
                container.innerHTML = '<p class="empty-state">No profiles yet. <a href="./index.html">Create one →</a></p>';
                return;
            }

            let html = '<ul class="profile-list">';
            for (const name of profiles) {
                html += `
                    <li class="profile-item">
                        <a href="#" class="profile-link" data-profile="${name}">${escapeHtml(name)}</a>
                        <button type="button" class="btn btn-small btn-danger delete-btn" data-profile="${name}">Delete</button>
                    </li>
                `;
            }
            html += '</ul>';
            container.innerHTML = html;

            // Wire delete buttons
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const name = btn.getAttribute('data-profile');
                    if (confirm(`Delete profile "${name}"?`)) {
                        deleteProfile(name);
                        renderProfileList();
                        showAlert(`Profile "${name}" deleted.`, 'success');
                    }
                });
            });

            // Wire profile links
            document.querySelectorAll('.profile-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const name = link.getAttribute('data-profile');
                    const fp = loadProfile(name);
                    if (fp) {
                        displayProfileDetails(name, fp);
                    }
                });
            });
        }

        function displayProfileDetails(name, profile) {
            let detailCard = document.querySelector('.profile-detail-card');
            if (!detailCard) {
                const contentGrid = document.querySelector('.content-grid');
                detailCard = document.createElement('div');
                detailCard.className = 'card profile-detail-card';
                contentGrid.appendChild(detailCard);
            }

            // Display profile metadata
            const wordCount = profile.wordCount || 0;
            const chunkCount = profile.chunkCount || 0;

            let html = `<h2>${escapeHtml(name)} — Profile Details</h2>`;
            html += `<p><strong>Words analyzed:</strong> ${wordCount.toLocaleString()}</p>`;
            html += `<p><strong>Text chunks:</strong> ${chunkCount}</p>`;
            html += `<p><strong>Anchor calibration mean:</strong> ${(profile.anchorMean || 0).toFixed(3)}</p>`;
            html += `<p><strong>Anchor calibration std:</strong> ${(profile.anchorStd || 0).toFixed(3)}</p>`;

            detailCard.innerHTML = html;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showAlert(message, type = 'info') {
            const container = document.querySelector('.container');
            if (!container) return;

            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;

            const pageHeader = document.querySelector('.page-header');
            if (pageHeader) {
                pageHeader.parentNode.insertBefore(alert, pageHeader.nextSibling);
            } else {
                container.insertBefore(alert, container.firstChild);
            }

            setTimeout(() => alert.remove(), 5000);
        }

        // Initial render
        renderProfileList();
    </script>
</body>
</html>
